<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;width:100%;height:100%;overflow:hidden;background:#0e0e14;touch-action:none;}
#root{width:100%;height:100%;overflow:hidden;}

/* Scrollable areas */
.scroll-y{overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;justify-content:center;
  border-radius:10px;font-family:'Cinzel',serif;letter-spacing:.07em;
  cursor:pointer;transition:all .15s;border:none;outline:none;
  -webkit-user-select:none;user-select:none;
  min-height:44px;padding:0 16px;font-size:0.8rem;
}
.btn:active{transform:scale(.95);opacity:.85;}
.btn-sm{min-height:38px;padding:0 12px;font-size:.72rem;border-radius:8px;}

/* Hand tiles */
.hx{transition:all .15s ease;cursor:pointer;}
.hx.sel{filter:brightness(1.6) drop-shadow(0 0 9px rgba(255,220,80,.7));transform:translateY(-8px);}
.hx:active{filter:brightness(1.5);transform:translateY(-5px);}

/* Spot pulse */
@keyframes sp{0%,100%{opacity:.25}55%{opacity:.85}}
.sp{animation:sp 1.5s ease-in-out infinite;cursor:pointer;}

/* Overlays */
@keyframes fu{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .35s ease forwards;}

/* Point flash */
@keyframes pt-flash{0%{opacity:0;transform:scale(.65)}12%{opacity:1;transform:scale(1.1)}22%{transform:scale(1)}75%{opacity:1}100%{opacity:0;transform:scale(.92)}}
.pt-flash{animation:pt-flash 2s cubic-bezier(.16,1,.3,1) forwards;}

/* Taunt */
@keyframes taunt-in{0%{opacity:0;transform:translateY(10px)}15%{opacity:1;transform:translateY(0)}85%{opacity:1}100%{opacity:0}}
.taunt{animation:taunt-in 3s ease forwards;pointer-events:none;}

/* Tile drop */
@keyframes tile-drop{0%{opacity:0;transform:scale(1.35)}55%{transform:scale(.97)}100%{opacity:1;transform:scale(1)}}
.tile-drop{animation:tile-drop .3s cubic-bezier(.22,1.1,.36,1) forwards;}

/* Gamble glow */
@keyframes gamble-glow{0%,100%{filter:drop-shadow(0 0 5px #ffd700)}50%{filter:drop-shadow(0 0 14px #ffd700)}}
.gamble-cell{animation:gamble-glow 1.8s ease-in-out infinite;}

/* CPU pulse */
@keyframes cpu-pulse{0%,100%{opacity:.25}50%{opacity:.95}}
.cpu-last{animation:cpu-pulse .45s ease-in-out 2;}

/* Pan button */
.pb{
  width:44px;height:44px;border-radius:8px;
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);
  color:#aaa;font-size:1.1rem;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all .14s;-webkit-user-select:none;user-select:none;
}
.pb:active{background:rgba(255,255,255,.18);color:#fff;}
</style>
</head>
<body>
<div id="root"></div>

<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
// ═══════════════════════════════════════
// FLAWED v1.123 — iPad PWA Edition
// ═══════════════════════════════════════

const { useState, useCallback, useRef, useEffect, createElement: h } = React;

// ── Constants ──────────────────────────────────────────────────────
const ELEMENTS = ["fire","water","earth","air"];
const EC = {
  fire:  {light:"#FF8C42",dark:"#8B3000",glow:"#FF4500",bg:"#2e0e02",sym:"🔥",name:"Fire"},
  water: {light:"#5CC8FF",dark:"#1a5fa0",glow:"#00AAFF",bg:"#061828",sym:"💧",name:"Water"},
  earth: {light:"#72D475",dark:"#2a6b2e",glow:"#00FF66",bg:"#061a08",sym:"🌿",name:"Earth"},
  air:   {light:"#FFE566",dark:"#9a7a10",glow:"#FFD700",bg:"#1c1a04",sym:"🌀",name:"Air"},
};
const CPU_PERSONALITIES = [
  {id:"vex",name:"Vex",emoji:"😈",style:"Corner Hunter",desc:"Obsessed with high-value edge cells. Ruthless and predictable.",
   bias:{edgeMult:2.5,neighbourMult:2,reservePenalty:6},
   taunts:["Corner secured. 😈","That's mine now.","Five points. Delicious.","You can't stop me."],
   sulks:["...fine.","Temporary setback.","Enjoy it while it lasts.","That won't happen again."]},
  {id:"mire",name:"Mire",emoji:"🌿",style:"Interior Builder",desc:"Plays deep and slow, building interior chains. Patient and hard to read.",
   bias:{edgeMult:1.0,neighbourMult:4,reservePenalty:4},
   taunts:["Roots go deep.","You don't see the pattern yet.","Interior secured.","Growing…"],
   sulks:["Unexpected.","The soil shifts.","I adapt.","Hmm."]},
  {id:"flux",name:"Flux",emoji:"🌀",style:"Chaotic",desc:"Plays semi-randomly. You never know what it'll do. Occasionally brilliant.",
   bias:{edgeMult:1.0,neighbourMult:1.0,reservePenalty:0},
   taunts:["Chaos reigns!","Did I mean to do that? Yes.","Order is an illusion.","Wheee!"],
   sulks:["Entropy wins eventually.","All part of the plan.","Oops? Or not?","🌀"]},
];

const HUMAN_IDX=0, CPU_IDX=1, HAND_SIZE=5, BOARD_RADIUS=5;
// iPad: bigger hexes
const SZ=42;
const DIRS=[[1,-1],[1,0],[0,1],[-1,1],[-1,0],[0,-1]];
const OPP=[3,4,5,0,1,2];

// ── Audio ──────────────────────────────────────────────────────────
let _actx=null;
function gac(){
  if(!_actx) _actx=new(window.AudioContext||window.webkitAudioContext)();
  if(_actx.state==="suspended") _actx.resume();
  return _actx;
}
function tone(freq,freq2,type,vol,atk,dec,delay){
  try{
    const ctx=gac(),t=ctx.currentTime+(delay||0);
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.type=type||"sine"; o.frequency.setValueAtTime(freq,t);
    if(freq2) o.frequency.exponentialRampToValueAtTime(freq2,t+(dec||.2)*.6);
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(vol||.15,t+(atk||.01));
    g.gain.exponentialRampToValueAtTime(.001,t+(atk||.01)+(dec||.2));
    o.connect(g);g.connect(ctx.destination);
    o.start(t);o.stop(t+(dec||.2)+.05);
  }catch(e){}
}
function noise(freq,q,vol,dur,delay){
  try{
    const ctx=gac(),t=ctx.currentTime+(delay||0);
    const n=ctx.sampleRate*(dur||.15);
    const buf=ctx.createBuffer(1,n,ctx.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=Math.random()*2-1;
    const s=ctx.createBufferSource(),f=ctx.createBiquadFilter(),g=ctx.createGain();
    s.buffer=buf; f.type="bandpass"; f.frequency.value=freq||800; f.Q.value=q||8;
    g.gain.setValueAtTime(vol||.1,t);
    g.gain.exponentialRampToValueAtTime(.001,t+(dur||.15));
    s.connect(f);f.connect(g);g.connect(ctx.destination);
    s.start(t);s.stop(t+(dur||.15)+.01);
  }catch(e){}
}
const SND={
  fire:()=>{noise(180,3,.14,.2);noise(320,5,.09,.15,.04);tone(120,60,"sawtooth",.07,.01,.2);},
  water:()=>{noise(2200,6,.11,.24);noise(1600,4,.08,.3,.05);tone(880,440,"sine",.08,.02,.28);},
  earth:()=>{noise(80,4,.2,.2);tone(110,70,"triangle",.12,.005,.22);},
  air:()=>{tone(1320,1100,"sine",.11,.01,.38);tone(1760,null,"sine",.08,.02,.28,.07);noise(3200,12,.06,.15);},
  reveal:(pts)=>{const f=440+(pts||2)*80;tone(f,null,"sine",.16,.01,.7);tone(f*1.5,null,"sine",.1,.01,.55,.13);},
  gamble:()=>{[523,659,784,1047].forEach((f,i)=>tone(f,null,"triangle",.15,.01,.28,i*.09));},
  draw:()=>{noise(600,10,.09,.12);tone(330,null,"triangle",.08,.005,.14);},
  win:()=>{[392,523,659,784,1047].forEach((f,i)=>tone(f,null,"triangle",.15,.02,.28,i*.11));},
  lose:()=>{tone(330,196,"sawtooth",.11,.02,.5);tone(247,147,"sawtooth",.08,.05,.48,.17);},
};

// ── Game logic ─────────────────────────────────────────────────────
function hkey(q,r){return q+","+r;}
function inBounds(q,r){return Math.max(Math.abs(q),Math.abs(r),Math.abs(q+r))<=BOARD_RADIUS;}
function axialToPixel(q,r){return{x:SZ*Math.sqrt(3)*(q+r/2),y:SZ*1.5*r};}
function hexCorners(cx,cy,s){
  return Array.from({length:6},(_,i)=>{
    const a=Math.PI/180*(-90+60*i);
    return[cx+s*Math.cos(a),cy+s*Math.sin(a)];
  });
}

const DARK_MATCHES={fire:["air","water"],air:["fire","earth"],earth:["air","water"],water:["earth","fire"]};
function edgesMatch(a,b){
  if(!a||!b) return false;
  if(a.isLight&&b.isLight) return a.element===b.element;
  if(!a.isLight&&!b.isLight) return DARK_MATCHES[a.element].includes(b.element);
  return false;
}
function makeEdges(el){
  return[{element:el,isLight:true},{element:el,isLight:true},{element:el,isLight:true},
         {element:el,isLight:false},{element:el,isLight:false},{element:el,isLight:false}];
}
function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function makePieces(){
  let id=0;const all=[];
  ELEMENTS.forEach(el=>{for(let j=0;j<25;j++) all.push({id:id++,element:el,edges:makeEdges(el)});});
  return shuffle(all);
}

const CORNER_KEYS=new Set([[-5,0],[-5,5],[0,-5],[0,5],[5,-5],[5,0]].map(([q,r])=>hkey(q,r)));
function buildOuterTiers(){
  const map={};
  for(const k of CORNER_KEYS) map[k]=5;
  for(const k of CORNER_KEYS){
    const[q,r]=k.split(",").map(Number);
    for(const[dq,dr]of DIRS){
      const nq=q+dq,nr=r+dr,nk=hkey(nq,nr);
      if(Math.max(Math.abs(nq),Math.abs(nr),Math.abs(nq+nr))===BOARD_RADIUS&&!CORNER_KEYS.has(nk))
        map[nk]=map[nk]||3;
    }
  }
  for(let q=-BOARD_RADIUS;q<=BOARD_RADIUS;q++)
    for(let r=-BOARD_RADIUS;r<=BOARD_RADIUS;r++)
      if(Math.max(Math.abs(q),Math.abs(r),Math.abs(q+r))===BOARD_RADIUS&&!map[hkey(q,r)])
        map[hkey(q,r)]=2;
  return map;
}
const OUTER_TIERS=buildOuterTiers();

function makeChokeSet(){
  const pool=[];
  for(let q=-BOARD_RADIUS;q<=BOARD_RADIUS;q++)
    for(let r=-BOARD_RADIUS;r<=BOARD_RADIUS;r++){
      const d=Math.max(Math.abs(q),Math.abs(r),Math.abs(q+r));
      if(d>=2&&d<=4) pool.push(hkey(q,r));
    }
  const a=[...pool];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return new Set(a.slice(0,7));
}

function makePointMap(chokeSet){
  const map={...OUTER_TIERS},keys=[];
  for(let q=-BOARD_RADIUS+1;q<=BOARD_RADIUS-1;q++)
    for(let r=-BOARD_RADIUS+1;r<=BOARD_RADIUS-1;r++){
      const d=Math.max(Math.abs(q),Math.abs(r),Math.abs(q+r));
      if(d>=1&&d<BOARD_RADIUS&&!chokeSet.has(hkey(q,r))){
        map[hkey(q,r)]=Math.floor(Math.random()*4)+1;
        keys.push(hkey(q,r));
      }
    }
  const gk=keys[Math.floor(Math.random()*keys.length)];
  map[gk]*=2;
  return{map,gambleKey:gk};
}

function isPlayable(q,r,cs){return inBounds(q,r)&&!cs.has(hkey(q,r));}
function getAllCells(cs){
  const cells=[];
  for(let q=-BOARD_RADIUS;q<=BOARD_RADIUS;q++)
    for(let r=-BOARD_RADIUS;r<=BOARD_RADIUS;r++)
      if(isPlayable(q,r,cs)) cells.push({q,r});
  return cells;
}
function calcScore(board,pid,pm){
  let pts=0;
  for(const c of Object.values(board)){if(c.owner!==pid) continue;pts+=pm[hkey(c.q,c.r)]||0;}
  return pts;
}
function getEdge(piece,rot,dir){return piece.edges[((dir-rot)%6+6)%6];}
function canPlace(board,piece,q,r,rot){
  let nb=false;
  for(let dir=0;dir<6;dir++){
    const n=board[hkey(q+DIRS[dir][0],r+DIRS[dir][1])];
    if(!n) continue;
    nb=true;
    if(!edgesMatch(getEdge(piece,rot,dir),getEdge(n.piece,n.rotation,OPP[dir]))) return false;
  }
  return nb;
}
function spotsFor(board,piece,rot,cs){
  const occ=new Set(Object.keys(board)),cands=new Set();
  if(!occ.size){if(isPlayable(0,0,cs)) cands.add("0,0");}
  else{
    for(const k of occ){
      const[q,r]=k.split(",").map(Number);
      for(const[dq,dr]of DIRS){const nq=q+dq,nr=r+dr,nk=hkey(nq,nr);if(!occ.has(nk)&&isPlayable(nq,nr,cs)) cands.add(nk);}
    }
  }
  const res=[];
  for(const k of cands){const[q,r]=k.split(",").map(Number);if(canPlace(board,piece,q,r,rot)) res.push({q,r});}
  return res;
}
function hasAnyValid(board,piece,cs){for(let rot=0;rot<6;rot++) if(spotsFor(board,piece,rot,cs).length>0) return true;return false;}
function anyRotSpots(board,piece,cs){
  const seen=new Set(),res=[];
  for(let rot=0;rot<6;rot++) for(const{q,r}of spotsFor(board,piece,rot,cs)){const k=hkey(q,r);if(!seen.has(k)){seen.add(k);res.push({q,r});}}
  return res;
}
function handPlayability(board,player,cs){
  return{hand:player.hand.map(p=>hasAnyValid(board,p,cs)),reserve:player.reserve.map(p=>hasAnyValid(board,p,cs))};
}
function cpuBestMove(board,player,cs,personality){
  const bias=(personality&&personality.bias)?personality.bias:{edgeMult:1,neighbourMult:5,reservePenalty:8};
  const isFlux=personality&&personality.id==="flux";
  const allP=[...player.hand.map((p,i)=>({piece:p,idx:i,fromReserve:false})),...player.reserve.map((p,i)=>({piece:p,idx:i,fromReserve:true}))];
  let best=null,bestS=-Infinity;
  for(const{piece,idx,fromReserve}of allP){
    for(let rot=0;rot<6;rot++){
      for(const{q,r}of spotsFor(board,piece,rot,cs)){
        let nb=0;for(const[dq,dr]of DIRS) if(board[hkey(q+dq,r+dr)]) nb++;
        const dist=Math.max(Math.abs(q),Math.abs(r),Math.abs(q+r));
        const ptVal=dist===BOARD_RADIUS?(OUTER_TIERS[hkey(q,r)]||2):2;
        const noise=isFlux?(Math.random()*60-30):0;
        const sc=ptVal*20*bias.edgeMult+nb*bias.neighbourMult-(fromReserve?bias.reservePenalty:0)+noise;
        if(sc>bestS){bestS=sc;best={piece,idx,fromReserve,q,r,rot};}
      }
    }
  }
  return best;
}
function checkEnd(bag,players,board,cs,pm){
  if(players.some(p=>[...p.hand,...p.reserve].some(pc=>hasAnyValid(board,pc,cs)))) return null;
  const scores=players.map(p=>calcScore(board,p.id,pm));
  const held=players.map(p=>p.hand.length+p.reserve.length);
  if(scores[0]!==scores[1]){const wi=scores[0]>scores[1]?0:1;return{winIdx:wi,scores,held,msg:players[wi].name+" wins with "+scores[wi]+" point"+(scores[wi]!==1?"s":"")+"!"};}
  if(held[0]!==held[1]){const wi=held[0]<held[1]?0:1;return{winIdx:wi,scores,held,msg:players[wi].name+" wins on tiebreaker — fewer pieces held!"};}
  return{winIdx:-1,scores,held,msg:"It's a draw!"};
}
function getPiece(g,sel){if(!sel) return null;const p=g.players[g.turn];return sel.fromReserve?p.reserve[sel.idx]:p.hand[sel.idx];}

function applyMove(g,{piece,idx,fromReserve,q,r,rot}){
  const newBoard={...g.board,[hkey(q,r)]:{piece,rotation:rot,q,r,owner:g.turn}};
  const newBag=[...g.bag];
  const next=(g.turn+1)%2;
  const newPlayers=g.players.map((p,i)=>{
    if(i!==g.turn) return p;
    const hand=fromReserve?[...p.hand]:p.hand.filter((_,j)=>j!==idx);
    const reserve=fromReserve?p.reserve.filter((_,j)=>j!==idx):[...p.reserve];
    while(hand.length<HAND_SIZE&&newBag.length>0) hand.push(newBag.pop());
    return{...p,hand,reserve};
  });
  const over=checkEnd(newBag,newPlayers,newBoard,g.chokeSet,g.pointMap);
  const earned=g.pointMap[hkey(q,r)]||0;
  const isGamble=hkey(q,r)===g.gambleKey;
  const newFlash={key:hkey(q,r),pts:earned,owner:g.turn,id:Date.now(),isGamble,element:piece.element};
  const histEntry={owner:g.turn,element:piece.element,pts:earned,id:Date.now()+1,isGamble};
  const newHistory=[histEntry,...g.scoreHistory].slice(0,5);
  const newTP=[...g.tilesPlaced]; newTP[g.turn]++;
  const newHS=[...g.highestSingle]; if(earned>newHS[g.turn]) newHS[g.turn]=earned;
  let newMvp=g.mvpCell; if(!newMvp||earned>newMvp.pts) newMvp={q,r,pts:earned,owner:g.turn};
  let cpuTaunt=null;
  if(g.turn===CPU_IDX&&earned>=4){const l=g.personality.taunts;cpuTaunt={text:l[Math.floor(Math.random()*l.length)],id:Date.now()+2};}
  if(g.turn===HUMAN_IDX&&earned>=4){const l=g.personality.sulks;cpuTaunt={text:l[Math.floor(Math.random()*l.length)],id:Date.now()+2};}
  const placedMsg=earned>0&&g.turn===HUMAN_IDX?` · +${earned}pt${isGamble?" 🎰 JACKPOT!":" revealed!"}` :"";
  let nextMsg;
  if(over) nextMsg="Game Over! "+over.msg;
  else if(next===HUMAN_IDX){
    const anyP=[...newPlayers[HUMAN_IDX].hand,...newPlayers[HUMAN_IDX].reserve].some(p=>hasAnyValid(newBoard,p,g.chokeSet));
    nextMsg=anyP?`Your turn — pick a hex${placedMsg}`:newBag.length>0?"No pieces playable — draw from the bag":"No pieces playable and bag is empty";
  } else nextMsg=g.personality.name+" is thinking…";
  return{...g,board:newBoard,bag:newBag,players:newPlayers,turn:over?g.turn:next,drawnThisTurn:false,peeked:false,
    selected:null,rotation:0,spots:[],hintSpots:[],gameOver:!!over,winner:over||null,
    cpuLastMove:g.turn===CPU_IDX?{q,r}:null,newFlash,cpuTaunt,scoreHistory:newHistory,
    tilesPlaced:newTP,highestSingle:newHS,mvpCell:newMvp,msg:nextMsg};
}
function initGame(pid){
  const cs=makeChokeSet();
  const{map:pointMap,gambleKey}=makePointMap(cs);
  const bag=makePieces();
  const first=bag.pop();
  const board={"0,0":{piece:first,rotation:0,q:0,r:0}};
  const personality=CPU_PERSONALITIES.find(p=>p.id===pid)||CPU_PERSONALITIES[0];
  const players=[
    {id:HUMAN_IDX,name:"You",hand:bag.splice(0,HAND_SIZE),reserve:[]},
    {id:CPU_IDX,name:personality.name,hand:bag.splice(0,HAND_SIZE),reserve:[]},
  ];
  return{bag,board,players,chokeSet:cs,pointMap,gambleKey,personality,turn:HUMAN_IDX,
    drawnThisTurn:false,peeked:false,selected:null,rotation:0,spots:[],hintSpots:[],
    gameOver:false,winner:null,msg:"Your turn — pick a hex from your hand",cpuLastMove:null,
    cpuTaunt:null,scoreHistory:[],tilesPlaced:[0,0],highestSingle:[0,0],mvpCell:null};
}

// ── HexPiece component ─────────────────────────────────────────────
function HexPiece({piece,rotation=0,size=SZ,cx,cy,highlight,mini=false}){
  const c=EC[piece.element];
  const pts=hexCorners(cx,cy,size-1.5);
  const children=[];
  if(highlight) children.push(
    h("polygon",{key:"hl",points:hexCorners(cx,cy,size+5).map(p=>p.join(",")).join(" "),
      fill:"none",stroke:c.glow,strokeWidth:3,opacity:.65,filter:"url(#glow)"})
  );
  children.push(
    h("polygon",{key:"bg",points:pts.map(p=>p.join(",")).join(" "),
      fill:c.bg,stroke:highlight?c.glow:"rgba(255,255,255,0.1)",strokeWidth:highlight?1.5:1})
  );
  DIRS.forEach((_,dir)=>{
    const edge=getEdge(piece,rotation,dir);
    const col=edge.isLight?c.light:c.dark;
    const p1=pts[dir],p2=pts[(dir+1)%6],f=0.16;
    const i1=[p1[0]*(1-f)+cx*f,p1[1]*(1-f)+cy*f];
    const i2=[p2[0]*(1-f)+cx*f,p2[1]*(1-f)+cy*f];
    const lineChildren=[
      h("line",{key:"l",x1:i1[0],y1:i1[1],x2:i2[0],y2:i2[1],
        stroke:col,strokeWidth:mini?size*.17:size*.21,strokeLinecap:"round",opacity:edge.isLight?1:.8})
    ];
    if(!mini) lineChildren.push(
      h("circle",{key:"c",cx:(i1[0]+i2[0])/2,cy:(i1[1]+i2[1])/2,r:size*.07,
        fill:edge.isLight?"rgba(255,255,255,0.95)":"rgba(0,0,0,0.9)",stroke:col,strokeWidth:.5})
    );
    children.push(h("g",{key:"e"+dir},lineChildren));
  });
  children.push(
    h("text",{key:"sym",x:cx,y:cy+(mini?size*.3:size*.33),textAnchor:"middle",
      fontSize:mini?size*.58:size*.62,style:{userSelect:"none"}},c.sym)
  );
  return h("g",{style:{pointerEvents:"none"}},children);
}

}

// ── Main App ───────────────────────────────────────────────────────
function App(){
  const [picking,setPicking]=useState(true);
  const [G,setG]=useState(()=>initGame("vex"));
  const [off,setOff]=useState({x:0,y:0});
  const [showRules,setShowRules]=useState(false);
  const [flashes,setFlashes]=useState([]);
  const [taunt,setTaunt]=useState(null);
  const [muted,setMuted]=useState(false);
  const drag=useRef(null);

  // Responsive board size based on screen
  const vw=window.innerWidth,vh=window.innerHeight;
  // iPad landscape: use ~60% height for board, portrait: wider
  const isLandscape=vw>vh;
  const W=Math.min(vw-20, isLandscape?Math.floor(vh*.88):vw-20);
  const H=isLandscape?Math.floor(vh*.56):Math.floor(vw*.72);
  const ox=W/2+off.x, oy=H/2+off.y;

  const snd=useCallback((name,pts)=>{
    if(muted) return;
    if(name==="reveal") SND.reveal(pts);
    else if(SND[name]) SND[name]();
  },[muted]);

  // CPU
  useEffect(()=>{
    if(G.gameOver||G.turn!==CPU_IDX) return;
    const t=setTimeout(()=>{
      setG(g=>{
        if(g.gameOver||g.turn!==CPU_IDX) return g;
        const move=cpuBestMove(g.board,g.players[CPU_IDX],g.chokeSet,g.personality);
        if(move) return applyMove(g,move);
        if(g.bag.length>0){
          const nb=[...g.bag],drawn=nb.pop();
          const playable=hasAnyValid(g.board,drawn,g.chokeSet);
          const np=g.players.map((p,i)=>{if(i!==CPU_IDX) return p;return playable?{...p,hand:[...p.hand,drawn]}:{...p,reserve:[...p.reserve,drawn]};});
          const next=(g.turn+1)%2;
          const over=checkEnd(nb,np,g.board,g.chokeSet,g.pointMap);
          return{...g,bag:nb,players:np,turn:over?g.turn:next,drawnThisTurn:false,peeked:false,gameOver:!!over,winner:over||null,cpuLastMove:null,hintSpots:[],msg:over?"Game Over! "+over.msg:"Your turn — pick a hex from your hand"};
        }
        const over=checkEnd(g.bag,g.players,g.board,g.chokeSet,g.pointMap);
        if(over) return{...g,gameOver:true,winner:over,msg:"Game Over! "+over.msg,cpuLastMove:null};
        return{...g,turn:HUMAN_IDX,drawnThisTurn:false,peeked:false,msg:g.personality.name+" passed — your turn",cpuLastMove:null};
      });
    },700);
    return()=>clearTimeout(t);
  },[G.turn,G.gameOver]);

  // CPU highlight clear
  useEffect(()=>{
    if(!G.cpuLastMove) return;
    const t=setTimeout(()=>setG(g=>({...g,cpuLastMove:null})),900);
    return()=>clearTimeout(t);
  },[G.cpuLastMove]);

  // Flash + sound
  useEffect(()=>{
    if(!G.newFlash) return;
    const fl=G.newFlash;
    snd(fl.element);
    setTimeout(()=>{if(fl.isGamble) snd("gamble"); else snd("reveal",fl.pts);},180);
    setFlashes(f=>[...f,fl]);
    setG(g=>({...g,newFlash:null}));
    const t=setTimeout(()=>setFlashes(f=>f.filter(x=>x.id!==fl.id)),2000);
    return()=>clearTimeout(t);
  },[G.newFlash,snd]);

  // Game over sound
  useEffect(()=>{
    if(!G.gameOver||!G.winner) return;
    setTimeout(()=>{
      if(G.winner.winIdx===HUMAN_IDX) snd("win");
      else if(G.winner.winIdx===CPU_IDX) snd("lose");
      else snd("reveal",2);
    },400);
  },[G.gameOver]);

  // Taunt
  useEffect(()=>{
    if(!G.cpuTaunt) return;
    setTaunt(G.cpuTaunt);
    setG(g=>({...g,cpuTaunt:null}));
    const t=setTimeout(()=>setTaunt(null),3000);
    return()=>clearTimeout(t);
  },[G.cpuTaunt]);

  // Touch/pan handlers
  const onTS=e=>{e.preventDefault();const t=e.touches[0];drag.current={sx:t.clientX-off.x,sy:t.clientY-off.y};};
  const onTM=e=>{e.preventDefault();if(!drag.current) return;const t=e.touches[0];setOff({x:t.clientX-drag.current.sx,y:t.clientY-drag.current.sy});};
  const onTE=()=>{drag.current=null;};

  // Actions
  const selectPiece=useCallback((pi,idx,fromReserve)=>{
    setG(g=>{
      if(g.turn!==HUMAN_IDX||g.turn!==pi||g.gameOver) return g;
      const piece=fromReserve?g.players[pi].reserve[idx]:g.players[pi].hand[idx];
      const spots=spotsFor(g.board,piece,0,g.chokeSet);
      const canPlay=hasAnyValid(g.board,piece,g.chokeSet);
      const hints=canPlay&&spots.length===0?anyRotSpots(g.board,piece,g.chokeSet):[];
      return{...g,selected:{idx,fromReserve},rotation:0,spots,hintSpots:hints,
        msg:!canPlay?EC[piece.element].name+" has no valid placements — try another piece or draw"
          :spots.length>0?`Placing ${EC[piece.element].name} — ${spots.length} spot${spots.length!==1?"s":""} available`
          :EC[piece.element].name+" needs rotating — purple cells show where it can fit"};
    });
  },[]);

  const rotate=useCallback(d=>{
    setG(g=>{
      if(!g.selected||g.turn!==HUMAN_IDX) return g;
      const rot=(g.rotation+d+6)%6;
      const piece=getPiece(g,g.selected);
      const spots=spotsFor(g.board,piece,rot,g.chokeSet);
      const hints=spots.length===0?anyRotSpots(g.board,piece,g.chokeSet):[];
      return{...g,rotation:rot,spots,hintSpots:hints,
        msg:spots.length?`${EC[piece.element].name} at ${rot*60}° — ${spots.length} spot${spots.length!==1?"s":""}. Tap to place`

    });
  },[]);

      if(!g.selected||g.gameOver||g.turn!==HUMAN_IDX) return g;

      if(!canPlace(g.board,piece,q,r,g.rotation)) return g;
      const{idx,fromReserve}=g.selected;
      return applyMove(g,{piece,idx,fromReserve,q,r,rot:g.rotation});
    });
  },[]);

      if(!g.bag.length||g.gameOver||g.turn!==HUMAN_IDX||g.drawnThisTurn) return g;

      const playable=hasAnyValid(g.board,drawn,g.chokeSet);
      const np=g.players.map((p,i)=>{if(i!==HUMAN_IDX) return p;return playable?{...p,hand:[...p.hand,drawn]}:{...p,reserve:[...p.reserve,drawn]};});
      const next=playable?HUMAN_IDX:CPU_IDX;

        msg:over?"Game Over! "+over.msg:playable?"Drew "+EC[drawn.element].name+" — now place it":"Drew "+EC[drawn.element].name+" — unplayable, sent to reserve"};
    });
  },[snd]);

  const cancel=()=>setG(g=>({...g,selected:null,rotation:0,spots:[],hintSpots:[],msg:"Your turn — pick a hex from your hand"}));
  const reset=()=>{setG(initGame(G.personality.id));setOff({x:0,y:0});setFlashes([]);setTaunt(null);setPicking(true);};
  const PAN=70;
  const pan=(dx,dy)=>setOff(o=>({x:o.x+dx,y:o.y+dy}));

  const{board,players,turn,selected,rotation,spots,hintSpots,gameOver:over,winner,msg,bag,cpuLastMove,scoreHistory,personality,gambleKey}=G;
  const preview=getPiece(G,selected);
  const isCpu=turn===CPU_IDX&&!over;
  const scores=players.map(p=>calcScore(board,p.id,G.pointMap));
  const playability=!isCpu&&!over?handPlayability(board,players[HUMAN_IDX],G.chokeSet):{hand:[],reserve:[]};

  // ── RENDER ──────────────────────────────────────────────────────
  return h("div",{style:{
    width:"100vw",height:"100vh",
    background:"radial-gradient(ellipse at 25% 25%,#1e1a2e 0%,#181818 55%,#0e1a1c 100%)",
    fontFamily:"'Cinzel',Georgia,serif",color:"#e8e0d5",

  // ── Controls row ─────────────────────────────────────────────

        h("div",{style:{fontSize:".75rem",fontWeight:600,letterSpacing:".08em",marginBottom:6,color:active?"#f0e8e0":"#686868",display:"flex",justifyContent:"space-between",alignItems:"center"}},
          h("span",null,(!isHuman?personality.emoji+" ":"")+player.name+(active?(isHuman?" ▶":" ⚙"):"")),
          h("div",{style:{display:"flex",gap:8,alignItems:"center"}},
            h("span",{style:{fontSize:".7rem",color:active?"#FFE566":"#555",fontFamily:"'Cinzel',serif"}},scores[pi]+"pt"),
            !isHuman&&h("span",{style:{fontSize:".62rem",color:"#444",fontFamily:"'Crimson Text',serif"}},personality.style)
          )
        ),
        // Hand
        h("div",{style:{display:"flex",gap:4,flexWrap:"wrap",marginBottom:player.reserve.length>0?6:0}},
          player.hand.map((piece,idx)=>{
            const canP=isHuman&&(play.hand[idx]!==false);
            const isSel=selected&&!selected.fromReserve&&selected.idx===idx&&pi===turn;
            return h("div",{key:piece.id,className:"hx"+(isSel?" sel":""),
              onClick:()=>isHuman&&!isCpu&&!over&&selectPiece(pi,idx,false),
              style:{position:"relative",cursor:isHuman&&!isCpu?"pointer":"default"}},
              h("svg",{width:44,height:46},
                h("g",{transform:"translate(22,20)"},h(HexPiece,{piece,rotation:0,size:18,cx:0,cy:0,mini:true}))
              ),
              isHuman&&h("div",{style:{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:8,height:8,borderRadius:"50%",background:canP?"#5f5":"#f55",boxShadow:"0 0 4px "+(canP?"#5f5":"#f55"),border:"1px solid rgba(0,0,0,.4)"}})
            );
          })
        ),
        // Reserve
        player.reserve.length>0&&h("div",null,
          h("div",{style:{fontSize:".58rem",color:"#555",marginBottom:3,letterSpacing:".08em",fontFamily:"'Crimson Text',serif"}},"RESERVE"),
          h("div",{style:{display:"flex",gap:3,flexWrap:"wrap"}},
            player.reserve.map((piece,idx)=>{
              const canP=isHuman&&(play.reserve[idx]!==false);
              const isSel=selected&&selected.fromReserve&&selected.idx===idx&&pi===turn;
              return h("div",{key:piece.id,className:"hx"+(isSel?" sel":""),
                onClick:()=>isHuman&&!isCpu&&!over&&selectPiece(pi,idx,true),
                style:{position:"relative",opacity:.8,cursor:isHuman&&!isCpu?"pointer":"default"}},
                h("svg",{width:36,height:38},
                  h("g",{transform:"translate(18,17)"},h(HexPiece,{piece,rotation:0,size:14,cx:0,cy:0,mini:true}))
                ),
                isHuman&&h("div",{style:{position:"absolute",bottom:0,left:"50%",transform:"translateX(-50%)",width:6,height:6,borderRadius:"50%",background:canP?"#5f5":"#f55",border:"1px solid rgba(0,0,0,.4)"}})
              );
            })
          )
        )
      );
    })
  ),

  // ── Pan controls ─────────────────────────────────────────────
  h("div",{style:{display:"flex",alignItems:"center",justifyContent:"center",gap:6,marginTop:6,opacity:.8,flexShrink:0}},
    h("button",{className:"pb",onClick:()=>pan(PAN,0)},"◀"),
    h("div",{style:{display:"flex",flexDirection:"column",gap:5}},
      h("button",{className:"pb",onClick:()=>pan(0,PAN)},"▲"),
      h("button",{className:"pb",onClick:()=>pan(0,-PAN)},"▼")
    ),
    h("button",{className:"pb",onClick:()=>pan(-PAN,0)},"▶"),
    h("button",{className:"pb",onClick:()=>setOff({x:0,y:0}),style:{fontSize:".7rem",color:"#aaa",marginLeft:2}},"●")
  ),

  // ── Legend ────────────────────────────────────────────────────
  h("div",{style:{marginTop:5,display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center",fontSize:".6rem",color:"#555",fontFamily:"'Crimson Text',serif",flexShrink:0}},
    ELEMENTS.map(el=>h("span",{key:el,style:{color:EC[el].light}},EC[el].sym+" "+EC[el].name)),
    h("span",null,"· Bright=Light · Dim=Dark · 🎰=Gamble")
  ),

  // ── Rules modal ───────────────────────────────────────────────
  showRules&&h("div",{className:"fu",style:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:16},onClick:()=>setShowRules(false)},
    h("div",{className:"scroll-y",onClick:e=>e.stopPropagation(),style:{background:"linear-gradient(160deg,#1a1a2e,#141e14)",border:"1px solid rgba(255,255,255,.2)",borderRadius:14,padding:"24px 22px",maxWidth:500,width:"100%",maxHeight:"85vh",fontFamily:"'Crimson Text',serif",color:"#ccc",lineHeight:1.65}},
      h("div",{style:{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}},
        h("h2",{style:{margin:0,fontFamily:"'Cinzel',serif",fontSize:"1.2rem",fontWeight:800,letterSpacing:".2em",background:"linear-gradient(90deg,#FF8C42,#FFE566,#72D475,#5CC8FF)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},"HOW TO PLAY"),
        h("button",{onClick:()=>setShowRules(false),style:{background:"none",border:"none",color:"#555",cursor:"pointer",fontSize:"1.4rem",lineHeight:1,padding:"0 4px"}},"✕")
      ),
      h(Section,{title:"🎯 Goal"},"Score points by placing hexes. Most points wins. Tiebreaker: fewest pieces held."),
      h(Section,{title:"🎲 Setup"},"100 hexes, 25 each of 🔥💧🌿🌀. One placed at centre. Each player draws 5."),
      h(Section,{title:"▶ Your Turn"},
        h("strong",{style:{color:"#ddd"}},"1. Tap")," a hex from your hand.",h("br"),
        h("strong",{style:{color:"#ddd"}},"2. Rotate")," with ↺ ↻ until gold dashes appear.",h("br"),
        h("strong",{style:{color:"#ddd"}},"3. Tap")," a gold dashed cell to place it.",h("br"),
        h("strong",{style:{color:"#ddd"}},"No moves?")," Draw once per turn. Unplayable tiles go to reserve."
      ),
      h(Section,{title:"🏆 Scoring"},"Corner cells = 5pt · Near-corner = 3pt · Mid-edge = 2pt · Interior = hidden 1–4pt. The 🎰 cell is secretly doubled!"),
      h(Section,{title:"🔗 Edge Rules"},"Light↔Light: same element only. Dark↔Dark: must follow the cycle (Fire↔Air↔Earth↔Water). Light↔Dark: never valid."),
      h(Section,{title:"🚫 Choke Points"},"Seven cells are blocked (✕). They create corridors and force strategic routing."),
      h("div",{style:{textAlign:"center",marginTop:18}},
        h("button",{onClick:()=>setShowRules(false),style:{background:"linear-gradient(135deg,#FF8C42,#FF3300)",border:"none",borderRadius:8,color:"#fff",padding:"12px 30px",cursor:"pointer",fontFamily:"'Cinzel',serif",fontSize:".8rem",letterSpacing:".1em",minHeight:44}},"GOT IT")
      )
    )
  ),

  // ── Game over ─────────────────────────────────────────────────
  over&&winner&&h("div",{className:"fu",style:{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,.93)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:200,padding:16}},
    h("div",{style:{background:"linear-gradient(135deg,#181828,#281818)",border:"1px solid rgba(255,255,255,.22)",borderRadius:14,padding:"24px 22px",textAlign:"center",maxWidth:440,width:"100%"}},
      h("h2",{style:{fontSize:"1.8rem",fontWeight:800,letterSpacing:".22em",margin:"0 0 6px",background:winner.winIdx===-1?"linear-gradient(90deg,#5CC8FF,#FFE566)":"linear-gradient(90deg,#FF8C42,#FFE566)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}},winner.winIdx===-1?"DRAW!":"GAME OVER"),
      h("p",{style:{fontFamily:"'Crimson Text',serif",color:"#888",marginBottom:16,fontSize:".95rem"}},winner.msg),
      h("div",{style:{display:"flex",gap:10,justifyContent:"center",marginBottom:14}},
        players.map((p,pi)=>{
          const isW=winner.winIdx===pi;
          return h("div",{key:p.id,style:{flex:1,background:"rgba(255,255,255,.04)",border:"1px solid "+(isW?"rgba(255,200,60,.4)":"rgba(255,255,255,.07)"),borderRadius:10,padding:"12px 10px"}},
            h("div",{style:{fontSize:".72rem",letterSpacing:".1em",color:isW?"#FFE566":"#555",marginBottom:5}},(pi===CPU_IDX?personality.emoji+" ":"")+p.name+(isW?" 🏆":"")),
            h("div",{style:{fontSize:"2rem",fontWeight:800,color:isW?"#FFE566":"#888",lineHeight:1}},winner.scores[pi],h("span",{style:{fontSize:".65rem",fontWeight:400,color:"#555"}},"pt")),
            h("div",{style:{borderTop:"1px solid rgba(255,255,255,.07)",marginTop:8,paddingTop:7}},
              [["Tiles",G.tilesPlaced[pi]],["Best","+"+G.highestSingle[pi]+"pt"],["Held",p.hand.length+p.reserve.length+" pcs"]].map(([l,v])=>
                h("div",{key:l,style:{display:"flex",justifyContent:"space-between",fontSize:".68rem",color:"#555",marginTop:3,fontFamily:"'Crimson Text',serif"}},
                  h("span",null,l),h("span",{style:{color:"#888"}},v)
                )
              )
            )
          );
        })
      ),
      G.mvpCell&&h("div",{style:{background:"rgba(255,215,0,.06)",border:"1px solid rgba(255,215,0,.2)",borderRadius:8,padding:"8px 14px",marginBottom:14,fontFamily:"'Crimson Text',serif",fontSize:".82rem",color:"#aaa"}},
        "🏅 ",h("strong",{style:{color:"#ffd700"}},"MVP Cell")," — +"+G.mvpCell.pts+"pt scored by "+(G.mvpCell.owner===HUMAN_IDX?"You":personality.name)
      ),
      h("button",{className:"btn",onClick:reset,style:{background:"linear-gradient(135deg,#FF8C42,#FF3300)",color:"#fff",padding:"0 32px",fontSize:".85rem",marginTop:4}},"PLAY AGAIN")
    )
  ),

  // ── Point flashes ─────────────────────────────────────────────
  flashes.map(fl=>{
    const col=fl.owner===HUMAN_IDX?"#88ddff":"#ffaa55";
    const lbl=fl.owner===HUMAN_IDX?"You scored":personality.name+" scored";
    return h("div",{key:fl.id,className:"pt-flash",style:{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:500,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",pointerEvents:"none"}},
      h("div",{style:{display:"flex",flexDirection:"column",alignItems:"center",background:"rgba(0,0,0,.6)",borderRadius:20,padding:"20px 48px 24px",border:"2px solid "+col+"44",boxShadow:"0 0 50px "+col+"55"}},
        h("span",{style:{fontSize:".78rem",letterSpacing:".25em",color:col,fontFamily:"'Cinzel',serif",opacity:.85,marginBottom:4}},lbl),
        h("span",{style:{fontSize:"5.5rem",fontWeight:800,lineHeight:1,color:col,fontFamily:"'Cinzel',serif",textShadow:"0 0 35px "+col+", 0 0 70px "+col+"88"}},"+"+fl.pts),
        h("span",{style:{fontSize:".72rem",letterSpacing:".2em",color:col,fontFamily:"'Cinzel',serif",opacity:.7,marginTop:5}},fl.isGamble?"🎰 JACKPOT!":"REVEALED")
      )
    );
  })

  ); // end App return
}

try {
  if(ReactDOM.createRoot){
    ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
  } else {
    ReactDOM.render(h(App,null), document.getElementById("root"));
  }
} catch(e) {
  document.getElementById("root").innerHTML =
    '<div style="color:#ff6b6b;font-family:monospace;padding:30px;background:#1a0a0a;min-height:100vh;">' +
    '<h2 style="color:#ff4444">FLAWED — Script Error</h2>' +
    '<pre style="white-space:pre-wrap;font-size:13px">' + (e && (e.stack || e.message || String(e))) + '</pre>' +
    '<p style="color:#888;font-size:12px">Please report this error.</p></div>';
}

</script>
</body>
</html>
